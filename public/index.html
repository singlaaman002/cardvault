// ── API CALLS (go to YOUR Vercel backend) ────────────────────────────────────
// In production this is blank (same domain). In dev you can set a full URL.
const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3000' : '';

async function apiCall(endpoint, body) {
  const res = await fetch(`${API_BASE}/api/${endpoint}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `API error ${res.status}`);
  }
  return res.json();
}

// Analyze a single card
async function analyzeOne(image, cardIndex) {
  return apiCall('analyze', { 
    image: { base64: image.base64, mediaType: image.mediaType },
    cardIndex 
  });
}

// Fetch live comps for a single card
async function fetchComps(cardInfo) {
  return apiCall('comps', { cardInfo });
}

// PSA cert lookup
async function lookupPSA(certNumber, psaToken) {
  return apiCall('psa', { certNumber, psaToken });
}

// Duplicate check
async function checkDuplicate(base64, mediaType, existingCards) {
  return apiCall('duplicate', { base64, mediaType, existingCards });
}

// ── IMAGE HELPER ──────────────────────────────────────────────────────────────
function readImageFile(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const dataUrl=e.target.result;
      if(file.type==="image/jpeg"||file.type==="image/png"||file.type==="image/webp"){
        resolve({dataUrl,base64:dataUrl.split(",")[1],mediaType:file.type});return;
      }
      const img=new Image();
      img.onload=()=>{
        try{
          const c=document.createElement("canvas");
          c.width=img.naturalWidth||800;c.height=img.naturalHeight||800;
          c.getContext("2d").drawImage(img,0,0);
          const jpeg=c.toDataURL("image/jpeg",0.88);
          resolve(jpeg.length>100?{dataUrl:jpeg,base64:jpeg.split(",")[1],mediaType:"image/jpeg"}:{dataUrl,base64:dataUrl.split(",")[1],mediaType:file.type||"image/jpeg"});
        }catch{resolve({dataUrl,base64:dataUrl.split(",")[1],mediaType:file.type||"image/jpeg"})}
      };
      img.onerror=()=>resolve({dataUrl,base64:dataUrl.split(",")[1],mediaType:file.type||"image/jpeg"});
      img.src=dataUrl;
    };
    reader.onerror=()=>reject(new Error("Failed to read "+file.name));
    reader.readAsDataURL(file);
  });
}
